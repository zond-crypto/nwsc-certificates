<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#003d7a" />
    <meta name="description" content="NWSC Water Analysis Certificate System" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NWSC DocGen" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>NWSC - Water Analysis Certificate System</title>

    <style>
      #pwa-safari-banner {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #003d7a;
        color: #fff;
        padding: 14px 16px;
        font-family: sans-serif;
        font-size: 13px;
        z-index: 9999;
        align-items: center;
        gap: 12px;
      }
      #pwa-safari-banner.show { display: flex; }
      #pwa-safari-banner p { margin: 0; flex: 1; line-height: 1.5; }
      #pwa-safari-banner button {
        background: #e8b400; color: #1a1a00;
        border: none; border-radius: 6px;
        padding: 6px 14px; font-weight: bold;
        cursor: pointer; white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Safari iOS install banner (shown only on unsupported browsers) -->
    <div id="pwa-safari-banner" role="banner" aria-label="Install app">
      <p>
        📲 <strong>Install this app:</strong> tap the Share icon
        <svg style="display:inline;vertical-align:middle" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        then <em>Add to Home Screen</em>.
      </p>
      <button id="pwa-safari-dismiss">Dismiss</button>
    </div>

    <script>
      // ── Service Worker registration ──────────────────────────────────────
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }

      // ── PWA install prompt (Chrome / Edge / Samsung Internet) ────────────
      const INSTALL_DISMISSED_KEY = 'pwa_install_dismissed';
      let deferredPrompt = null;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Only auto-show if user hasn't dismissed before
        if (!localStorage.getItem(INSTALL_DISMISSED_KEY)) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choice) => {
            if (choice.outcome === 'dismissed') {
              localStorage.setItem(INSTALL_DISMISSED_KEY, '1');
            }
            deferredPrompt = null;
          });
        }
      });

      // ── Safari / iOS fallback banner ─────────────────────────────────────
      (function () {
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches
          || navigator.standalone === true;
        const dismissed = localStorage.getItem('pwa_safari_banner_dismissed');

        if (isIOS && !isInStandaloneMode && !dismissed) {
          document.getElementById('pwa-safari-banner').classList.add('show');
        }

        document.getElementById('pwa-safari-dismiss').addEventListener('click', () => {
          document.getElementById('pwa-safari-banner').classList.remove('show');
          localStorage.setItem('pwa_safari_banner_dismissed', '1');
        });
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
